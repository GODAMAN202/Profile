<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>मेरा प्रोफाइल - [आपका नाम]</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="theme-toggle">
    <button id="toggleTheme">🌓</button>
  </div>

  <div class="profile-card">

      <img src="https://i.ibb.co/kVfB0bXv/IMG-6657.pngalt="Profile Photo" class="profile-img" id="profilePic">
      <h1 id="myName">AMAN </h1>
      <p class="tagline" id="myTagline"></p>
    </div>

    <div class="profile-body">
      <section class="about">
        <h2>ABOUT MY SELF</h2>
        <p id="myDetail">
          यहाँ अपने बारे में विस्तार से लिखें। आप कौन हैं, क्या करते हैं, आपकी शिक्षा, आदि।
        </p>
      </section>

      <section class="passion">
        <h2>MY PASSION</h2>
        <ul id="passionList">
          <li>👨🏻‍💻CODER</li>
          <li></li>
          <li>💻 कोडिंग</li>
        </ul>
      </section>

      <section class="contact">
        <h2>CONTACT</h2>
        <p>EMAIL: <span id="email">aap@example.com</span></p/>
      </section>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
